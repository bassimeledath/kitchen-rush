<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kitchen Rush — Replay</title>
<link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
<div id="app">
  <main class="layout">
    <!-- compact order rack (tickets at the pass) -->
    <div class="orders-rack" id="orders"></div>

    <!-- the kitchen, centered; score/time overlaid on its corners -->
    <div class="stage" id="stage">
      <div class="hud hud-left"><span class="k">score</span><b id="score">0</b><i class="delta" id="scoreDelta"></i></div>
      <div class="hud hud-right"><b id="clock">0</b><span class="k">/<span id="horizon">0</span>s</span><i class="combo" id="combo"></i></div>
      <div class="grid" id="grid"></div>
      <div class="fx-layer" id="fxLayer"></div>
      <div class="chef" id="chef"></div>
      <div class="think-bubble" id="thinkBubble" hidden>🤔 <b id="thinkAmt"></b></div>
    </div>
    <div class="caption" id="caption">&nbsp;</div>
  </main>

  <footer class="transport">
    <div class="buttons">
      <button id="btnRestart" title="restart (Home)">↺</button>
      <button id="btnStepBack" title="step back (←)">⏮</button>
      <button id="btnPlay" class="primary" title="play / pause (space)">▶</button>
      <button id="btnStepFwd" title="step forward (→)">⏭</button>
      <button id="btnSpeed" title="cycle speed">1×</button>
    </div>
    <input type="range" id="scrub" class="scrub" min="0" max="1000" value="0" />
    <label class="filebtn" title="load a replay JSON">load<input type="file" id="fileInput" accept=".json,application/json" hidden /></label>
  </footer>
</div>

<script src="sprites.js?v=2"></script>
<script src="app.js?v=2"></script>
</body>
</html>
