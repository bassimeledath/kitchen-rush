<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kitchen Rush — Replay</title>
<link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
<div id="app">
  <div class="warnbar" id="warnbar" hidden></div>
  <main class="layout">
    <!-- one pane per replay; ?replays=a.json,b.json races up to 4 on one shared clock -->
    <div class="panes" id="panes"></div>
    <!-- ticket rail: the single pane's own rack, or the shared race rail with per-model pips -->
    <div class="orders-rack" id="orders"></div>
  </main>

  <footer class="transport">
    <div class="buttons">
      <button id="btnRestart" title="restart (Home)">↺</button>
      <button id="btnStepBack" title="step back (←)">⏮</button>
      <button id="btnPlay" class="primary" title="play / pause (space)">▶</button>
      <button id="btnStepFwd" title="step forward (→)">⏭</button>
      <button id="btnSpeed" title="cycle speed">1×</button>
    </div>
    <span class="gclock" id="gclock" hidden><b id="gt">0</b><span class="k">/<span id="gh">0</span>s</span></span>
    <input type="range" id="scrub" class="scrub" min="0" max="1000" value="0" />
    <label class="filebtn" title="load replay JSON(s) — pick several to race them">load<input type="file" id="fileInput" accept=".json,application/json" multiple hidden /></label>
  </footer>
</div>

<script src="sprites.js?v=5"></script>
<script src="app.js?v=5"></script>
</body>
</html>
